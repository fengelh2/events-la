# events-la — venue master list
#
# Each entry is one source. Geographic scope: LA proper + Greater LA County.
# Use `city` field for NEIGHBORHOOD (DTLA, Hollywood, Westside, Pasadena, etc.)
# rather than literal city — the dynamic Where filter chips show whatever
# values appear in the data.
#
# Status: tier-1 onboarded 2026-05-10. ~6 venues to start; expand from
# Recommended Onboarding Order list in CLAUDE.md as needed.

# ============================================================================
# DOWNTOWN LA (DTLA)
# ============================================================================

- id: lacma
  name: LACMA
  city: Mid-Wilshire
  category: museum_exhibition
  homepage: https://www.lacma.org
  calendar_url: https://www.lacma.org/events-calendar
  kind: html_list
  source_priority: 0
  selectors:
    item: ".card-event"
    title: ".card-event__title"
    date: ".card-event__date"
    detail_link: "a.card-event__link"
  notes: |
    LA County Museum of Art. Server-rendered .card-event cards on the
    /events-calendar page. Date format observed: "Sun, May 10, 7:30 pm" or
    "May 13–Aug 17". Selectors to be adjusted on first scrape.

# ============================================================================
# WESTSIDE — Hammer + Getty cluster
# ============================================================================

- id: hammer
  name: Hammer Museum
  city: Westwood
  category: museum_exhibition
  homepage: https://hammer.ucla.edu
  calendar_url: https://hammer.ucla.edu/programs-events
  kind: html_list
  source_priority: 0
  selectors:
    item: ".result-item--program"
    title: ".result-item__title"
    date: ".result-item__date"
    detail_link: "a.result-item__link"
  notes: |
    Per agent recon: paged via ?start_date=MM/DD/YYYY query string. Modal
    architecture; primary listing has ~10 events visible per page. Selectors
    based on observed `result-item--program` class — verify on first scrape.

- id: getty
  name: The Getty
  city: Brentwood
  category: museum_exhibition
  homepage: https://www.getty.edu
  calendar_url: https://www.getty.edu/visit/cal/
  kind: html_list
  source_priority: 0
  selectors:
    item: ".calendar-event"
    title: ".calendar-event__title"
    date: ".calendar-event__date"
    detail_link: "a.calendar-event__link"
  notes: |
    Single calendar covers Getty Center + Getty Villa. ~21 server-rendered
    tiles per page. Selectors based on agent recon — adjust if first scrape
    fails. Most events are talks, tours, gallery walks (audience filter
    catches "Family Workshop" / "kids" automatically).

