# events-la — venue master list
#
# Each entry is one source. Geographic scope: LA proper + Greater LA County.
#
# `city` field uses 4 zones (decided 2026-05-10):
#   - Westside        — Hammer, Getty, Geffen, Royce, Broad Stage, Skirball, Wallis
#   - Central LA      — LACMA, MOCA, Disney Hall, LA Phil, LA Opera, CTG, Hollywood Bowl
#   - Pasadena & East — Pasadena Playhouse, Norton Simon, Huntington (San Marino),
#                       A Noise Within, LACO (Glendale)
#   - Greater LA      — Long Beach Symphony, Soraya (Northridge), Getty Villa,
#                       outliers >20mi from DTLA
#
# Special: `__aggregator__` means "tag city from event data, not the venue".
# Used by Discover LA (cross-venue feed).
#
# Status: tier-1 onboarded 2026-05-10. ~6 venues to start; expand from
# Recommended Onboarding Order list in CLAUDE.md as needed.

# ============================================================================
# AGGREGATOR — highest priority, seeds the calendar
# ============================================================================

- id: discover-los-angeles
  name: Discover Los Angeles
  city: __aggregator__
  category: mixed
  homepage: https://www.discoverlosangeles.com
  calendar_url: https://www.discoverlosangeles.com/events?page=1
  kind: json_ld_aggregator
  source_priority: 5
  default_zone: Greater LA   # fallback when neighborhood is unrecognized
  notes: |
    Single-page aggregator. The bare /events URL only renders the editorial
    "this week" subset (~97 events). `?page=1` triggers Drupal's full Views
    render — JSON-LD ItemList carries ~660 unique URLs spanning the full
    horizon. Companion HTML cards carry editorial `data-neighborhood`,
    `data-region`, `data-category` attrs that the parser uses for zone +
    category tagging. Reconnoitered 2026-05-10.

# ============================================================================
# CENTRAL LA — Mid-Wilshire, DTLA, Hollywood
# ============================================================================

- id: lacma
  name: LACMA
  city: Central LA
  category: museum_exhibition
  homepage: https://www.lacma.org
  calendar_url: https://www.lacma.org/events-calendar
  kind: html_list
  source_priority: 0
  selectors:
    item: ".card-event"
    title: ".card-event__name"
    date: ".card-event__date"
  notes: |
    LA County Museum of Art (Mid-Wilshire). Server-rendered .card-event cards
    on the /events-calendar page. Date format: "Sun May 10|11 am". Cards
    have no per-event link — fall back to listing URL.

# ============================================================================
# WESTSIDE — Westwood / Brentwood / Beverly Hills / Santa Monica / Sepulveda Pass
# ============================================================================

- id: hammer
  name: Hammer Museum
  city: Westside
  category: museum_exhibition
  homepage: https://hammer.ucla.edu
  calendar_url: https://hammer.ucla.edu/programs-events
  kind: html_list
  source_priority: 0
  selectors:
    item: "a.result-item"
    title: ".result-item__title"
    date: ".result-item__occurrence"
    detail_link: "@href"
  notes: |
    Westwood (Westside). Item element IS the anchor (use @href for detail
    URL). Date format e.g. "Wed May 13 12:30 PM" — no year, dateparser
    PREFER_DATES_FROM=future infers it. ~10 events visible per page;
    pagination via ?start_date=MM/DD/YYYY for deeper history (defer).

- id: getty
  name: The Getty
  city: Westside
  category: museum_exhibition
  homepage: https://www.getty.edu
  calendar_url: https://www.getty.edu/visit/cal/
  kind: html_list
  source_priority: 0
  selectors:
    item: ".calendar-event"
    title: "h4"
    date: ".date"
    detail_link: "a@href"
  notes: |
    Brentwood (Westside) — Getty Center. Single calendar covers both Getty
    Center + Getty Villa (also Westside). ~21 tiles per page. Date format
    "OCT 25" (no year — dateparser PREFER_DATES_FROM=future fills it).
    Most events are talks, tours, gallery walks; audience filter catches
    "Family Workshop" / "kids" automatically.

