# ============================================================================
# AGGREGATOR — highest priority
# ============================================================================

- id: discover-los-angeles
  name: Discover Los Angeles
  city: __aggregator__
  category: mixed
  homepage: https://www.discoverlosangeles.com
  calendar_url: https://www.discoverlosangeles.com/events
  kind: unknown          # needs a JSON-LD walker — defer until built
  source_priority: 5
  notes: |
    600+ JSON-LD `@type:Event` entities on a single page, server-rendered.
    Drupal site. Should be onboarded FIRST — seeds the calendar with hundreds
    of cross-venue events on day one. Need a `kind: json_ld_aggregator` parser
    path that extracts JSON-LD blocks via extruct or regex, walks each Event,
    and tags `city` from the location.address.addressLocality field.

