# ============================================================================
# DEFERRED — TIER-1 venues pending parser features
# ============================================================================
# Not onboarded yet because they need parser features beyond the current
# kinds. Listed here for future onboarding.

- id: academy-museum
  name: Academy Museum of Motion Pictures
  city: Central LA
  category: film
  homepage: https://www.academymuseum.org
  calendar_url: https://www.academymuseum.org/en/calendar
  kind: nextjs_contentful
  source_priority: 0
  data_path: /en/calendar.json
  typename: ProgramEvent
  title_field: programTitle
  start_field: activeStartDate
  end_field: activeEndDate
  url_pattern: https://www.academymuseum.org/en/program/{slug}
  notes: |
    Mid-Wilshire museum of cinema (Saban Building, ex-May Co.). Built on
    Next.js + Contentful. The /en/calendar page embeds a rotating buildId;
    we fetch /_next/data/<buildId>/en/calendar.json (~460KB) and walk for
    __typename=ProgramEvent (63 items). Title is Contentful rich-text
    nested under programTitle.json.content[..] → flattened by the parser.
    Onboarded 2026-05-11 via the nextjs_contentful parser kind.

- id: la-philharmonic
  name: LA Philharmonic — Walt Disney Concert Hall
  city: Central LA
  category: concert
  homepage: https://www.laphil.com
  calendar_url: https://www.laphil.com/events/feed/live
  kind: flat_json_feed
  source_priority: 0
  title_path: program.name
  start_path: start_time
  url_path: absolute_url
  venue_path: venue.name
  filter_field: venue.name
  filter_value: Walt Disney Concert Hall
  categories_path: categories
  notes: |
    Walt Disney Concert Hall (DTLA / Central LA). LA Phil's public events
    feed at /events/feed/live returns 580 future events across LA Phil,
    Hollywood Bowl, and The Ford. We fetch the whole feed and filter by
    venue.name. Disney Hall yields ~172 performances. Discovered 2026-05-10.

