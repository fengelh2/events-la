name: Rebuild calendar

on:
  schedule:
    # 11:00 UTC daily ≈ 03:00 PST / 04:00 PDT — quiet hours in LA
    - cron: '0 11 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'config/**'
      - '.github/workflows/**'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cache + install Playwright Chromium for runtime-rendered venues.
      - name: Compute Playwright version
        id: pw-version
        run: |
          echo "version=$(pip show playwright | awk '/^Version:/ {print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Rebuild events.html
        run: python tools/rebuild_calendar.py --verbose

      # Persist the seen-events state file back to main so the NEW badge
      # has a stable cross-run memory. Without this every nightly rebuild
      # would start with an empty state file and re-seed bootstrap.
      - name: Commit seen-events state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/seen_events.json; then
            git add data/seen_events.json
            git commit -m "auto: update seen_events.json"
            git push origin main
          fi

      - name: Stage for deploy
        run: |
          mkdir -p _deploy
          cp .tmp/events.html _deploy/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          force_orphan: true
          commit_message: 'Auto-update calendar (${{ github.event_name }})'
